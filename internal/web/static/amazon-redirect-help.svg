<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Amazon redirect URL help illustration</title>
  <desc id="desc">Illustration showing where to copy the full URL from the browser address bar after Amazon login.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#182234"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="980" height="420" rx="18" fill="url(#bg)"/>
  <rect x="40" y="50" width="900" height="320" rx="14" fill="#0c1320" stroke="#2a3a55"/>
  <rect x="40" y="50" width="900" height="44" rx="14" fill="#17233a"/>
  <circle cx="68" cy="72" r="8" fill="#ef4444"/>
  <circle cx="92" cy="72" r="8" fill="#f59e0b"/>
  <circle cx="116" cy="72" r="8" fill="#22c55e"/>
  <rect x="150" y="60" width="760" height="24" rx="10" fill="#0e1a2d" stroke="#3c557a"/>
  <text x="166" y="77" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#b7d3ff">https://www.amazon.com/ap/maplanding?openid.oa2.authorization_code=AAABBBCCC...&amp;openid.return_to=...</text>

  <rect x="72" y="132" width="836" height="72" rx="10" fill="#0f2038" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="160" font-family="Segoe UI, Tahoma, sans-serif" font-size="20" fill="#e7f0ff">Copy this entire URL from the address bar</text>
  <text x="90" y="186" font-family="Segoe UI, Tahoma, sans-serif" font-size="15" fill="#a7c2eb">Everything from https:// through the long authorization_code value.</text>

  <path d="M490 94 L490 120" stroke="#60a5fa" stroke-width="3"/>
  <polygon points="490,128 482,116 498,116" fill="#60a5fa"/>

  <rect x="72" y="236" width="836" height="100" rx="10" fill="#101a2a" stroke="#334155"/>
  <text x="90" y="265" font-family="Segoe UI, Tahoma, sans-serif" font-size="16" fill="#c9d9f0">Then paste it into APD Settings → Authentication and click</text>
  <text x="90" y="292" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#e2eeff">Complete Authentication</text>
  <text x="90" y="320" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" fill="#8aa4c7">Tip: If the page looks blank or says "Looking for Something?", that is expected.</text>
</svg>
